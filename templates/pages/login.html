{{define "content"}}
<div class="container-sm" style="padding: var(--spacing-3xl) var(--spacing-xl);">
    <div class="card" style="max-width: 400px; margin: 0 auto;">
        <div style="text-align: center; margin-bottom: var(--spacing-xl);">
            <div class="logo-mark" style="width: 48px; height: 48px; margin: 0 auto var(--spacing-md);">
                <span class="lb">[</span>
                <div class="sl"></div>
                <span class="rb">]</span>
            </div>
            <h2>Welcome back</h2>
            <p class="text-muted">Sign in to your account</p>
        </div>
        
        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-input" required placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" required placeholder="••••••••">
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
            </div>
        </form>
        
        <div style="text-align: center; margin-top: var(--spacing-lg);">
            <p class="text-small text-muted">
                Don't have an account? <a href="/register">Create one</a>
            </p>
        </div>
    </div>
</div>
{{end}}
