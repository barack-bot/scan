{{define "content"}}
<div class="container-sm" style="padding: var(--spacing-3xl) var(--spacing-xl);">
    <div class="card" style="max-width: 400px; margin: 0 auto;">
        <div style="text-align: center; margin-bottom: var(--spacing-xl);">
            <div class="logo-mark" style="width: 48px; height: 48px; margin: 0 auto var(--spacing-md);">
                <span class="lb">[</span>
                <div class="sl"></div>
                <span class="rb">]</span>
            </div>
            <h2>Get started</h2>
            <p class="text-muted">Create your KE-SCAN account</p>
        </div>
        
        <form method="POST" action="/register">
            <div class="form-group">
                <label class="form-label">Full name</label>
                <input type="text" name="name" class="form-input" required placeholder="John Doe">
            </div>
            
            <div class="form-group">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-input" required placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label class="form-label">Organization</label>
                <input type="text" name="organization" class="form-input" placeholder="Acme Corp (optional)">
                <p class="text-small text-muted" style="margin-top: var(--spacing-xs);">Your company or team name</p>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" required placeholder="Create a password">
                <p class="text-small text-muted" style="margin-top: var(--spacing-xs);">Must be at least 8 characters</p>
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
            </div>
        </form>
        
        <div style="text-align: center; margin-top: var(--spacing-lg);">
            <p class="text-small text-muted">
                Already have an account? <a href="/login">Sign in</a>
            </p>
        </div>
    </div>
</div>
{{end}}
